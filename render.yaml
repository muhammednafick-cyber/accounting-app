services:
  - type: web
    name: accounting-app
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      cd frontend && npm install && npm run build && cd ..
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: DB_TYPE
        value: postgres
      - key: DB_HOST
        fromDatabase:
          name: accounting-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: accounting-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: accounting-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: accounting-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: accounting-db
          property: password
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: accounting-db
    plan: free
