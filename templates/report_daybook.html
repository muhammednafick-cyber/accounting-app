{% extends "base.html" %}

{% block title %}Daybook{% endblock %}

{% block extra_head %}
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
{% endblock %}

{% block content %}
    <h1>Daybook</h1>
    <form class="dashboard-section">
        <input type="hidden" id="voucher_type" value="All">
        <div class="entry">
            <label for="report_date">Date:</label>
            <input type="text" id="report_date" name="report_date" class="input-standard-width" placeholder="DD-MM-YYYY" pattern="\d{2}-\d{2}-\d{4}">
        </div>
        <button type="button" class="btn btn-info" onclick="exportReport()">Export to Excel</button>
    </form>

    <script>
        $(document).ready(function() {
            // Set default date to today in DD-MM-YYYY
            const today = new Date();
            const day = String(today.getDate()).padStart(2, '0');
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const year = today.getFullYear();
            document.getElementById('report_date').value = `${day}-${month}-${year}`;
        });

        function exportReport() {
            const date = document.getElementById('report_date').value;
            // Pass the same date as from and to
            window.location.href = `/export_report/daybook?from_date=${date}&to_date=${date}`;
        }
    </script>
{% endblock %}
