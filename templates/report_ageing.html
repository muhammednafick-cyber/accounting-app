{% extends "base.html" %}

{% block title %}Ageing Report{% endblock %}

{% block extra_head %}
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
{% endblock %}

{% block content %}
    <h1>Ageing Report</h1>
    <form class="dashboard-section">
        <div class="entry">
            <label for="report_type">Report Type:</label>
            <select id="report_type" name="report_type" class="select2 input-standard-width" data-placeholder="Select Report Type">
                <option></option>
                <option value="receivable">Receivables (Debtors)</option>
                <option value="payable">Payables (Creditors)</option>
            </select>
        </div>
        <div class="entry">
            <label for="as_of_date">As Of Date:</label>
            <input type="text" id="as_of_date" name="as_of_date" class="input-standard-width" placeholder="DD-MM-YYYY" pattern="\d{2}-\d{2}-\d{4}">
        </div>
        <div class="entry">
            <label for="age_by">Age By:</label>
            <select id="age_by" name="age_by" class="input-standard-width">
                <option value="due_date">Due Date (credit terms)</option>
                <option value="voucher_date">Voucher Date</option>
            </select>
        </div>
        <button type="button" class="btn btn-primary" onclick="fetchReport()">Show Report</button>
        <button type="button" class="btn btn-info" onclick="exportReport()">Export to Excel</button>
    </form>

    <div id="reportContainer" style="margin-top: 20px;">
        <table id="reportTable" class="table-bordered" style="width: 100%;">
            <thead>
                <tr>
                    <th>Party Name</th>
                    <th style="text-align: right;">Total Balance</th>
                    <th style="text-align: right;">Not Due</th>
                    <th style="text-align: right;">0-3 Months</th>
                    <th style="text-align: right;">3-6 Months</th>
                    <th style="text-align: right;">6-9 Months</th>
                    <th style="text-align: right;">9-12 Months</th>
                    <th style="text-align: right;">1-2 Years</th>
                    <th style="text-align: right;">2-3 Years</th>
                    <th style="text-align: right;">Over 3 Years</th>
                </tr>
            </thead>
            <tbody id="reportBody"></tbody>
        </table>
    </div>

    <script>
        $(document).ready(function() {
            $('.select2').select2({
                allowClear: true,
                placeholder: function() {
                    return $(this).data('placeholder');
                }
            });
        });

        // Set default date to today
        document.addEventListener('DOMContentLoaded', function() {
            const asOfDateInput = document.getElementById('as_of_date');
            if (!asOfDateInput.value) {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                asOfDateInput.value = `${day}-${month}-${year}`;
            }
        });

        function exportReport() {
            const reportType = document.getElementById('report_type').value;
            const asOfDate = document.getElementById('as_of_date').value;
            
            if (!reportType) {
                alert('Please select a report type.');
                return;
            }

            const ageBy = document.getElementById('age_by').value;
            window.location.href = `/export_report/ageing?type=${reportType}&as_of_date=${asOfDate}&age_by=${ageBy}`;
        }

        function fetchReport() {
            const reportType = document.getElementById('report_type').value;
            const asOfDate = document.getElementById('as_of_date').value;
            
            if (!reportType) {
                alert('Please select a report type.');
                return;
            }

            const ageBy = document.getElementById('age_by').value;
            fetch(`/get_ageing_report?type=${reportType}&as_of_date=${asOfDate}&age_by=${ageBy}`)
                .then(response => response.json())
                .then(response => {
                    if (response.success) {
                        const data = response.data;
                        const tbody = document.getElementById('reportBody');
                        tbody.innerHTML = '';
                        
                        if (data.length === 0) {
                            tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;">No data found</td></tr>';
                            return;
                        }

                        const bucketKeys = ['not_due', '0_90', '91_180', '181_270', '271_365', '1_2y', '2_3y', '3y_plus'];
                        data.forEach(item => {
                            const row = document.createElement('tr');
                            let cells = `
                                <td>${item.ledger_name}</td>
                                <td style="text-align: right;">${parseFloat(item.balance).toFixed(2)}</td>`;
                            bucketKeys.forEach(k => {
                                cells += `<td style="text-align: right;">${parseFloat(item.buckets[k] || 0).toFixed(2)}</td>`;
                            });
                            row.innerHTML = cells;
                            tbody.appendChild(row);
                        });
                    } else {
                        alert('Error fetching report: ' + response.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('An error occurred while fetching the report.');
                });
        }
    </script>
{% endblock %}
